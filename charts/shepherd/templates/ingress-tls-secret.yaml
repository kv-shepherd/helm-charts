{{- if and .Values.ingress.enabled .Values.ingress.selfSigned.enabled (not .Values.ingress.tls) -}}
{{- $secretName := include "shepherd.ingressTLSSecretName" . -}}
{{- $namespace := include "shepherd.namespace" . -}}
{{- $hosts := list -}}
{{- range .Values.ingress.hosts -}}
{{- $hosts = append $hosts .host -}}
{{- end -}}
{{- $commonName := first $hosts -}}
{{- $existing := lookup "v1" "Secret" $namespace $secretName -}}
{{- $cert := dict -}}
{{- if not $existing -}}
{{- $cert = genSelfSignedCert $commonName nil $hosts (int .Values.ingress.selfSigned.durationDays) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "shepherd.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  {{- if $existing }}
  tls.crt: {{ index $existing.data "tls.crt" | quote }}
  tls.key: {{ index $existing.data "tls.key" | quote }}
  {{- else }}
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
  {{- end }}
{{- end }}
