apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shepherd.configName" . }}
  namespace: {{ include "shepherd.namespace" . }}
  labels:
    {{- include "shepherd.labels" . | nindent 4 }}
data:
  SERVER_PORT: {{ .Values.server.port | quote }}
  SERVER_PUBLIC_BASE_URL: {{ include "shepherd.publicBaseUrl" . | quote }}
  SERVER_ALLOWED_ORIGINS: {{ .Values.server.allowedOrigins | quote }}
  SERVER_ALLOW_CREDENTIALS: {{ .Values.server.allowCredentials | quote }}
  SERVER_UNSAFE_ALLOW_ALL_ORIGINS: {{ .Values.server.unsafeAllowAllOrigins | quote }}
  SERVER_TRUSTED_PROXIES: {{ .Values.server.trustedProxies | quote }}
  SERVER_READ_HEADER_TIMEOUT: {{ .Values.server.readHeaderTimeout | quote }}
  SERVER_IDLE_TIMEOUT: {{ .Values.server.idleTimeout | quote }}
  SERVER_MAX_REQUEST_BODY_BYTES: {{ .Values.server.maxRequestBodyBytes | int64 | quote }}
  GIN_MODE: release
  LOG_LEVEL: {{ .Values.server.logLevel | quote }}
  LOG_FORMAT: {{ .Values.server.logFormat | quote }}
  DATABASE_AUTO_APPLY_VERSIONED_MIGRATIONS: {{ .Values.database.autoApplyVersionedMigrations | quote }}
  DATABASE_AUTO_MIGRATE: {{ .Values.database.autoMigrate | quote }}
  RIVER_MAX_WORKERS: {{ .Values.server.riverMaxWorkers | quote }}
  RIVER_COMPLETED_JOB_RETENTION_PERIOD: {{ .Values.server.riverCompletedJobRetentionPeriod | quote }}
  WORKER_GENERAL_POOL_SIZE: {{ .Values.server.workerGeneralPoolSize | quote }}
  WORKER_K8S_POOL_SIZE: {{ .Values.server.workerK8sPoolSize | quote }}
