{{- if and .Values.edge.enabled .Values.edge.tls.enabled (not .Values.edge.tls.existingSecret) .Values.edge.tls.selfSigned.enabled -}}
{{- $secretName := include "shepherd.edgeTLSSecretName" . -}}
{{- $namespace := include "shepherd.namespace" . -}}
{{- $commonName := .Values.edge.tls.selfSigned.commonName | default "localhost" -}}
{{- $dnsNames := .Values.edge.tls.selfSigned.dnsNames | default (list "localhost") -}}
{{- $ipAddresses := .Values.edge.tls.selfSigned.ipAddresses | default (list "127.0.0.1") -}}
{{- $existing := lookup "v1" "Secret" $namespace $secretName -}}
{{- $cert := dict -}}
{{- if not $existing -}}
{{- $cert = genSelfSignedCert $commonName $ipAddresses $dnsNames (int .Values.edge.tls.selfSigned.durationDays) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "shepherd.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  {{- if $existing }}
  tls.crt: {{ index $existing.data "tls.crt" | quote }}
  tls.key: {{ index $existing.data "tls.key" | quote }}
  {{- else }}
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
  {{- end }}
{{- end }}
