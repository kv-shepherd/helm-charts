{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "shepherd.fullname" . }}
  namespace: {{ include "shepherd.namespace" . }}
  labels:
    {{- include "shepherd.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: {{ $.Values.ingress.apiPath | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "shepherd.componentName" (dict "root" $ "component" "server") }}
                port:
                  name: http
          - path: {{ $.Values.ingress.webPath | quote }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "shepherd.componentName" (dict "root" $ "component" "web") }}
                port:
                  name: http
    {{- end }}
{{- end }}
