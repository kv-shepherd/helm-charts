{{- if .Values.rbac.create -}}
{{- if .Values.rbac.clusterWide -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "shepherd.fullname" . }}
  labels:
    {{- include "shepherd.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.clusterRules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "shepherd.fullname" . }}
  labels:
    {{- include "shepherd.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "shepherd.serviceAccountName" . }}
    namespace: {{ include "shepherd.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "shepherd.fullname" . }}
{{- else }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "shepherd.fullname" . }}
  namespace: {{ include "shepherd.namespace" . }}
  labels:
    {{- include "shepherd.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "shepherd.fullname" . }}
  namespace: {{ include "shepherd.namespace" . }}
  labels:
    {{- include "shepherd.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "shepherd.serviceAccountName" . }}
    namespace: {{ include "shepherd.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "shepherd.fullname" . }}
{{- end }}
{{- end }}
