{{- if .Values.edge.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shepherd.componentName" (dict "root" . "component" "edge") }}-config
  namespace: {{ include "shepherd.namespace" . }}
  labels:
    {{- include "shepherd.componentLabels" (dict "root" . "component" "edge") | nindent 4 }}
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    limit_req_zone $binary_remote_addr zone=api_rate:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_rate:10m rate=5r/m;

    server {
      listen {{ .Values.edge.port }};
      server_name _;
      client_max_body_size 10m;
{{- if .Values.edge.tls.enabled }}

      return 308 https://$host{{- with .Values.edge.service.nodePorts.https }}:{{ . }}{{- end }}$request_uri;
    }

    server {
      listen {{ .Values.edge.tls.port }} ssl;
      http2 on;
      server_name _;
      client_max_body_size 10m;

      ssl_certificate /etc/nginx/tls/tls.crt;
      ssl_certificate_key /etc/nginx/tls/tls.key;
      ssl_session_cache shared:TLS:10m;
      ssl_session_timeout 1d;
      ssl_session_tickets off;
      ssl_protocols TLSv1.2 TLSv1.3;
      ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
      ssl_prefer_server_ciphers off;
{{- end }}

      location = /api/v1/health/live {
        proxy_pass http://{{ include "shepherd.componentName" (dict "root" . "component" "server") }}:{{ .Values.server.port }}/api/v1/health/live;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        access_log off;
      }

      location = /api/v1/health/ready {
        proxy_pass http://{{ include "shepherd.componentName" (dict "root" . "component" "server") }}:{{ .Values.server.port }}/api/v1/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        access_log off;
      }

      location = /api/v1/auth/login {
        limit_req zone=login_rate burst=3 nodelay;
        proxy_pass http://{{ include "shepherd.componentName" (dict "root" . "component" "server") }}:{{ .Values.server.port }}/api/v1/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
      }

      location /api/v1/ {
        limit_req zone=api_rate burst=50 nodelay;
        proxy_pass http://{{ include "shepherd.componentName" (dict "root" . "component" "server") }}:{{ .Values.server.port }}/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
      }

      location / {
        proxy_pass http://{{ include "shepherd.componentName" (dict "root" . "component" "web") }}:{{ .Values.web.port }};
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
      }
    }
{{- end }}
