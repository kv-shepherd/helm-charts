{{- if not .Values.secrets.existingSecret -}}
{{- $existingSecret := lookup "v1" "Secret" (include "shepherd.namespace" .) (include "shepherd.secretName" .) -}}
{{- $existingData := dict -}}
{{- if and $existingSecret $existingSecret.data -}}
{{- $existingData = $existingSecret.data -}}
{{- end -}}
{{- $existingPostgresPassword := "" -}}
{{- with get $existingData "POSTGRES_PASSWORD" -}}
{{- $existingPostgresPassword = . | b64dec -}}
{{- end -}}
{{- $existingSessionSecret := "" -}}
{{- with get $existingData "SECURITY_SESSION_SECRET" -}}
{{- $existingSessionSecret = . | b64dec -}}
{{- end -}}
{{- $existingEncryptionKey := "" -}}
{{- with get $existingData "SECURITY_ENCRYPTION_KEY" -}}
{{- $existingEncryptionKey = . | b64dec -}}
{{- end -}}
{{- $postgresPassword := .Values.postgresql.auth.password | default $existingPostgresPassword | default (randAlphaNum 32) -}}
{{- $sessionSecret := .Values.security.sessionSecret | default $existingSessionSecret | default (randAlphaNum 64) -}}
{{- $encryptionKey := .Values.security.encryptionKey | default $existingEncryptionKey | default (randAlphaNum 64 | sha256sum) -}}
{{- $databaseURL := .Values.database.url -}}
{{- if and .Values.postgresql.enabled (not $databaseURL) -}}
{{- $databaseURL = printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" .Values.postgresql.auth.username $postgresPassword (include "shepherd.postgresqlName" .) .Values.postgresql.auth.database -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shepherd.secretName" . }}
  namespace: {{ include "shepherd.namespace" . }}
  labels:
    {{- include "shepherd.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "database.url is required when postgresql.enabled=false" $databaseURL | quote }}
  SECURITY_SESSION_SECRET: {{ $sessionSecret | quote }}
  SECURITY_ENCRYPTION_KEY: {{ $encryptionKey | quote }}
  {{- if .Values.postgresql.enabled }}
  POSTGRES_PASSWORD: {{ $postgresPassword | quote }}
  {{- end }}
{{- end }}
